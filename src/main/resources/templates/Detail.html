<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꿈틀 | 카테고리 상세</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/detail.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header class="main-header">
  <div class="header-logo" onclick="location.href='/'" style="cursor:pointer">
    <i class="fas fa-seedling"></i>
    <span>꿈틀</span>
  </div>
  <div class="header-menu">
    <button id="btn-back" class="btn-logout-top" onclick="history.back()">돌아가기</button>
  </div>
</header>

<div class="main-layout">
  <div class="info-section">
    <h1 class="main-title">
      <span id="category-title">카테고리</span> 실천 보드
    </h1>

    <div class="status-cards">
      <div class="mini-card">
        <div class="growth-img-container">
          <img id="growth-img" src="" alt="성장 이미지">
        </div>
      </div>

      <div class="mini-card">
        <span class="label">카테고리 달성률</span>
        <div class="progress-bar">
          <div id="progress-fill" class="fill"></div>
        </div>
        <span class="value" id="achievement-text">0단계</span>
      </div>
    </div>
  </div>

  <div class="mandalart-section">
    <p class="guide-text-top">
      <i class="fas fa-info-circle"></i> 목표를 클릭하여 체크하세요!
    </p>

    <div class="mandalart-outer-grid" id="mandalart-grid">
      <div class="cell-display sub-cell" data-index="0"></div>
      <div class="cell-display sub-cell" data-index="1"></div>
      <div class="cell-display sub-cell" data-index="2"></div>
      <div class="cell-display sub-cell" data-index="3"></div>

      <div class="cell-display absolute-center" id="center-cell"></div>

      <div class="cell-display sub-cell" data-index="4"></div>
      <div class="cell-display sub-cell" data-index="5"></div>
      <div class="cell-display sub-cell" data-index="6"></div>
      <div class="cell-display sub-cell" data-index="7"></div>
    </div>
  </div>
</div>

<script th:src="@{/js/detail.js}"></script>
</body>
</html>
